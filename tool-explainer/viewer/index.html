<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TallerScan — Visor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
  :root {
    --bg:#08080f; --surface:#10101a; --card:#14141f; --border:#222230;
    --accent:#c8f03d; --accent2:#3de0f0; --text:#f0f0f8; --muted:#6a6a82;
    --font-head:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); }

  /* ── TOPBAR ── */
  #topbar {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; background:rgba(8,8,15,0.92);
    border-bottom:1px solid var(--border); backdrop-filter:blur(10px);
    height:52px;
  }
  .logo { font-family:var(--font-head); font-size:18px; font-weight:800; cursor:pointer; }
  .logo span { color:var(--accent); }
  #tool-badge {
    font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    background:var(--accent); color:#0e0e13; padding:4px 10px; border-radius:20px;
  }
  #repeat-btn {
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer;
    font-family:var(--font-body);
  }

  /* ═══════════════════════════════════════════
     GALLERY MODE (sin ?id= en URL)
  ═══════════════════════════════════════════ */
  #gallery-view {
    display:none; padding-top:52px; min-height:100vh;
    overflow-y:auto;
  }
  #gallery-view.active { display:block; }

  .gallery-hero {
    background:linear-gradient(135deg,#0e0e13 0%,#141422 100%);
    padding:2.5rem 1.5rem 2rem;
    border-bottom:1px solid var(--border);
    text-align:center;
  }
  .gallery-hero h1 { font-family:var(--font-head); font-size:28px; font-weight:800; margin-bottom:6px; }
  .gallery-hero p { color:var(--muted); font-size:14px; }
  .gallery-stats {
    display:flex; gap:1.5rem; justify-content:center; margin-top:1.25rem;
    flex-wrap:wrap;
  }
  .g-stat { text-align:center; }
  .g-stat .val { font-family:var(--font-head); font-size:24px; font-weight:800; color:var(--accent); }
  .g-stat .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }

  /* Filtros búsqueda */
  .gallery-search {
    padding:1.25rem 1.5rem 0.75rem;
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  .gallery-search input {
    flex:1; min-width:180px;
    background:var(--card); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:var(--font-body);
    font-size:14px; padding:9px 14px; outline:none;
    transition:border-color 0.15s;
  }
  .gallery-search input:focus { border-color:var(--accent); }
  .gallery-search input::placeholder { color:var(--muted); }

  /* Líneas/Áreas */
  .gallery-body { padding:0 1.5rem 3rem; }

  .line-section { margin-bottom:2rem; }
  .line-header {
    display:flex; align-items:center; gap:10px;
    padding:0.75rem 0; margin-bottom:0.75rem;
    border-bottom:2px solid var(--border);
    cursor:pointer; user-select:none;
  }
  .line-icon { font-size:20px; }
  .line-name { font-family:var(--font-head); font-size:16px; font-weight:700; }
  .line-count { font-size:11px; color:var(--muted); margin-left:auto; }
  .line-toggle { font-size:12px; color:var(--muted); transition:transform 0.2s; }
  .line-toggle.collapsed { transform:rotate(-90deg); }

  .line-machines {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:0.75rem;
    overflow:hidden; transition:max-height 0.3s ease;
  }

  /* Tarjeta de máquina en galería */
  .g-machine-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:1.1rem 1rem; cursor:pointer;
    transition:border-color 0.2s, transform 0.2s;
    animation:fadeUp 0.3s ease both;
    display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px;
  }
  .g-machine-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
  .g-card-icon { font-size:32px; line-height:1; }
  .g-card-name { font-family:var(--font-head); font-size:14px; font-weight:700; line-height:1.3; }
  .g-card-cat { font-size:10px; color:var(--accent); text-transform:uppercase; letter-spacing:0.7px; font-weight:600; }

  /* Sin máquinas */
  .gallery-empty { text-align:center; padding:3rem; color:var(--muted); }
  .gallery-empty .icon { font-size:40px; margin-bottom:1rem; opacity:0.4; }
  .gallery-empty h3 { font-family:var(--font-head); color:var(--text); margin-bottom:6px; }

  /* ═══════════════════════════════════════════
     VIEWER MODE (con ?id= en URL)
  ═══════════════════════════════════════════ */
  #viewer-wrap {
    display:none; position:fixed; top:52px; left:0; right:0; bottom:0;
    flex-direction:column;
  }
  #viewer-wrap.active { display:flex; }

  /* Model-Viewer */
  #mv-container {
    position:relative; flex:1; min-height:0; background:var(--bg); overflow:hidden;
  }
  model-viewer {
    width:100%; height:100%; background-color:transparent; --poster-color:transparent;
  }
  model-viewer::part(default-ar-button) {
    bottom:90px !important; right:16px !important;
    background:var(--accent) !important; color:#0e0e13 !important;
    border-radius:50px !important; padding:12px 22px !important;
    font-family:var(--font-head) !important; font-weight:800 !important;
    border:none !important; font-size:15px !important;
    box-shadow:0 4px 20px rgba(200,240,61,0.5) !important;
  }
  model-viewer::part(default-progress-bar) { background:var(--accent); height:3px; }

  #tool-title-float {
    position:absolute; top:14px; left:16px;
    font-family:var(--font-head); font-size:22px; font-weight:800;
    text-shadow:0 2px 8px rgba(0,0,0,0.7); pointer-events:none;
  }
  #tool-cat-float {
    position:absolute; top:44px; left:16px;
    font-size:11px; font-weight:700; color:var(--accent);
    letter-spacing:1.5px; text-transform:uppercase;
    text-shadow:0 1px 4px rgba(0,0,0,0.8); pointer-events:none;
  }
  #model-fallback-tag {
    position:absolute; top:14px; right:16px;
    font-size:11px; color:var(--muted);
    background:rgba(0,0,0,0.5); padding:3px 8px; border-radius:20px;
    display:none; pointer-events:none;
  }

  #loading {
    position:absolute; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    z-index:50;
  }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading p { color:var(--muted); font-size:14px; }
  #error-state {
    position:absolute; inset:0; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:2rem;
  }
  #error-state.show { display:flex; }
  .err-icon { font-size:48px; opacity:0.4; }
  #error-state h2 { font-family:var(--font-head); font-size:22px; }
  #error-state p { color:var(--muted); font-size:14px; }
  #back-to-gallery {
    margin-top:12px; background:var(--accent); color:#0e0e13;
    border:none; border-radius:8px; padding:10px 20px;
    font-family:var(--font-head); font-size:14px; font-weight:700; cursor:pointer;
  }

  /* Voz */
  #speech-wrap {
    flex-shrink:0; background:var(--surface);
    border-top:1px solid var(--border); padding:12px 16px;
    position:relative; z-index:10; min-height:72px; max-height:140px; overflow-y:auto;
  }
  #voice-progress {
    position:absolute; top:0; left:0; height:2px;
    background:var(--accent); width:0; transition:width linear; border-radius:0 2px 2px 0;
  }
  #speech-inner { display:flex; gap:12px; align-items:flex-start; }
  #speech-avatar {
    width:36px; height:36px; border-radius:50%;
    background:var(--card); border:2px solid var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; flex-shrink:0; overflow:hidden;
  }
  #speech-avatar canvas { width:36px; height:36px; }
  #speech-text { font-size:14px; line-height:1.7; color:var(--text); padding-top:2px; }
  #typing-cursor {
    display:inline-block; width:2px; height:14px;
    background:var(--accent); margin-left:2px; vertical-align:middle;
    animation:blink 0.7s infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

  /* Personaje */
  #char-wrap {
    position:absolute; bottom:0; right:0; z-index:10;
    width:180px; height:320px; pointer-events:none;
    filter: drop-shadow(0 0 18px rgba(200,240,61,0.25));
  }
  #char-wrap.talking { filter: drop-shadow(0 0 28px rgba(200,240,61,0.55)); }

  /* Tap overlay */
  #tap-overlay {
    position:absolute; inset:0; z-index:60;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
    background:rgba(8,8,15,0.82); backdrop-filter:blur(4px); cursor:pointer;
  }
  #tap-overlay .tap-icon { font-size:52px; animation:tapBounce 1.2s infinite; }
  #tap-overlay p {
    color:var(--accent); font-family:var(--font-head);
    font-size:18px; font-weight:800; letter-spacing:1px;
    text-align:center; padding:0 32px;
  }
  @keyframes tapBounce { 0%,100%{transform:scale(1) translateY(0);} 50%{transform:scale(1.15) translateY(-6px);} }

  /* AR */
  #ar-fab {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#0e0e13;
    border:none; border-radius:50px; padding:12px 24px;
    font-family:var(--font-head); font-size:15px; font-weight:800;
    cursor:pointer; z-index:20;
    box-shadow:0 4px 24px rgba(200,240,61,0.5);
    animation:pulse 2s infinite; white-space:nowrap;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(200,240,61,0.5);} 50%{box-shadow:0 0 0 8px rgba(200,240,61,0);} }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo" onclick="goToGallery()">Taller<span>Scan</span></div>
  <div id="tool-badge">Cargando...</div>
  <button id="repeat-btn" onclick="repeatSpeech()" style="display:none;">🔊 Repetir</button>
</div>

<!-- ═══ GALLERY VIEW ═══ -->
<div id="gallery-view">
  <div class="gallery-hero">
    <h1>⚙️ Máquinas del Salón</h1>
    <p>Selecciona una máquina para ver sus detalles</p>
    <div class="gallery-stats">
      <div class="g-stat"><div class="val" id="g-total">0</div><div class="lbl">Máquinas</div></div>
      <div class="g-stat"><div class="val" id="g-lines">0</div><div class="lbl">Líneas</div></div>
      <div class="g-stat"><div class="val" id="g-cats">0</div><div class="lbl">Categorías</div></div>
    </div>
  </div>
  <div class="gallery-search">
    <input type="text" id="g-search" placeholder="🔍 Buscar máquina..." oninput="filterGallery(this.value)">
  </div>
  <div class="gallery-body" id="gallery-body"></div>
</div>

<!-- ═══ VIEWER VIEW ═══ -->
<div id="viewer-wrap">
  <div id="mv-container">
    <model-viewer
      id="main-mv"
      camera-controls auto-rotate auto-rotate-delay="3000"
      shadow-intensity="1" ar ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto"
      min-camera-orbit="-Infinity -Infinity auto"
      max-camera-orbit="Infinity Infinity auto"
      interaction-prompt="none"
      meshopt-decoder-src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.18.1/meshopt_decoder.js"
      style="display:none;"
    ></model-viewer>

    <canvas id="three-canvas" style="display:none;"></canvas>
    <div id="tool-title-float"></div>
    <div id="tool-cat-float"></div>
    <div id="model-fallback-tag">Modelo procedural</div>

    <div id="char-wrap">
      <canvas id="char-canvas" width="180" height="320" style="width:180px;height:320px;"></canvas>
    </div>

    <div id="tap-overlay" style="display:none;" onclick="unlockAndSpeak()">
      <div class="tap-icon">👆</div>
      <p>Toca para escuchar la explicación</p>
    </div>

    <button id="ar-fab" onclick="activarAR()" style="display:none;">📷 Ver en tu espacio</button>

    <div id="loading"><div class="spinner"></div><p>Cargando herramienta...</p></div>
    <div id="error-state">
      <div class="err-icon">🔍</div>
      <h2>Máquina no encontrada</h2>
      <p>Escanea un código QR válido del salón</p>
      <button id="back-to-gallery" onclick="goToGallery()">← Ver todas las máquinas</button>
    </div>
  </div>

  <div id="speech-wrap">
    <div id="voice-progress"></div>
    <div id="speech-inner">
      <div id="speech-avatar">🤖</div>
      <div id="speech-text"><span id="text-out"></span><span id="typing-cursor"></span></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── PARAMS ──────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const machineId = params.get('id');
const isPreview = params.get('preview') === '1';

// ─── STATE ───────────────────────────────────────────────────────────
let allMachines = [];
let allLines = [];

// ─── DEBUG ───────────────────────────────────────────────────────────
function showDebug(msg) { console.log('[TallerScan]', msg); }

// ─── INDEXEDDB ───────────────────────────────────────────────────────
const DB_NAME='tallerscan_db', DB_VER=1, STORE_NAME='glb_store';
function openDB() {
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE_NAME);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
function dbGet(id) {
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(STORE_NAME,'readonly');
    const req=tx.objectStore(STORE_NAME).get('glb_'+id);
    req.onsuccess=e=>res(e.target.result||null);
    req.onerror=()=>res(null);
  }));
}

// ─── STORAGE ─────────────────────────────────────────────────────────
async function loadAllData() {
  // 1. localStorage (mismo navegador que admin)
  try {
    const rawM = localStorage.getItem('tallerscan_meta');
    const rawL = localStorage.getItem('tallerscan_lines');
    if(rawM) {
      allMachines = JSON.parse(rawM).map(m=>({...m, glbData:null}));
      allLines = rawL ? JSON.parse(rawL) : [];
      showDebug('Datos cargados desde localStorage: ' + allMachines.length + ' máquinas');
      return;
    }
  } catch(e) {}

  // 2. data.json (GitHub Pages / servidor)
  const href = window.location.href.split('?')[0].split('#')[0];
  const viewerDir = href.substring(0, href.lastIndexOf('/') + 1);
  const dataUrl = viewerDir + 'data.json';
  showDebug('Buscando datos en: ' + dataUrl);
  try {
    const resp = await fetch(dataUrl + '?t=' + Date.now());
    if(resp.ok) {
      const data = await resp.json();
      if(Array.isArray(data)) {
        // Formato antiguo: solo array de máquinas
        allMachines = data;
        allLines = [];
      } else {
        // Formato nuevo: { machines, lines }
        allMachines = data.machines || [];
        allLines = data.lines || [];
      }
      showDebug('data.json cargado: ' + allMachines.length + ' máquinas, ' + allLines.length + ' líneas');
    }
  } catch(e) {
    showDebug('Error cargando data.json: ' + e.message);
  }
}

async function getMachineFromStorage(id) {
  await loadAllData();
  const m = allMachines.find(m => m.id === id);
  if(!m) return null;
  if(m.hasGlb && !m.glbData) {
    try { m.glbData = await dbGet(id); } catch(e) {}
  }
  return m;
}

// ─── GALLERY MODE ─────────────────────────────────────────────────────
async function initGallery() {
  document.getElementById('gallery-view').classList.add('active');
  document.getElementById('tool-badge').textContent = 'GALERÍA';
  document.getElementById('repeat-btn').style.display = 'none';

  await loadAllData();
  renderGallery(allMachines, allLines);
}

function renderGallery(machines, lines, search='') {
  const body = document.getElementById('gallery-body');

  // Stats
  document.getElementById('g-total').textContent = machines.length;
  document.getElementById('g-lines').textContent = lines.length;
  document.getElementById('g-cats').textContent = new Set(machines.map(m=>m.cat)).size;

  if(!machines.length) {
    body.innerHTML = `<div class="gallery-empty"><div class="icon">🔧</div><h3>Sin máquinas aún</h3><p>El administrador no ha agregado máquinas todavía.</p></div>`;
    return;
  }

  const q = search.toLowerCase().trim();

  // Agrupar por línea
  const lineMap = {}; // lineId -> [machines]
  const noLine = [];

  machines.forEach(m => {
    const match = !q || m.name.toLowerCase().includes(q) || m.cat.toLowerCase().includes(q) || (m.lineName||'').toLowerCase().includes(q);
    if(!match) return;
    if(m.lineId) {
      if(!lineMap[m.lineId]) lineMap[m.lineId] = [];
      lineMap[m.lineId].push(m);
    } else {
      noLine.push(m);
    }
  });

  let html = '';

  // Renderizar líneas configuradas
  lines.forEach(line => {
    const ms = lineMap[line.id] || [];
    if(!ms.length && q) return; // en búsqueda, ocultar líneas vacías
    html += renderLineSection(line, ms);
  });

  // Máquinas sin línea asignada
  if(noLine.length) {
    const fakeLine = { id:'__noline__', name:'Sin línea asignada', icon:'📦', color:'#6a6a80' };
    html += renderLineSection(fakeLine, noLine);
  }

  // Si todo vacío por búsqueda
  if(!html) {
    html = `<div class="gallery-empty"><div class="icon">🔍</div><h3>Sin resultados</h3><p>No hay máquinas que coincidan con "${search}"</p></div>`;
  }

  body.innerHTML = html;
}

function renderLineSection(line, machines) {
  const machineCards = machines.map(m => `
    <div class="g-machine-card" onclick="openMachineViewer('${m.id}')" style="animation-delay:${Math.random()*0.2}s">
      <div class="g-card-icon">${escHtml(m.icon||'🔧')}</div>
      <div class="g-card-name">${escHtml(m.name)}</div>
      <div class="g-card-cat">${escHtml(m.cat)}</div>
    </div>
  `).join('');

  const color = line.color || '#c8f03d';

  return `
    <div class="line-section" id="line-sec-${line.id}">
      <div class="line-header" onclick="toggleLine('${line.id}')" style="border-bottom-color:${color}22;">
        <span class="line-icon">${line.icon || '📁'}</span>
        <span class="line-name" style="color:${color}">${escHtml(line.name)}</span>
        <span class="line-count">${machines.length} máquina${machines.length!==1?'s':''}</span>
        <span class="line-toggle" id="toggle-${line.id}">▼</span>
      </div>
      <div class="line-machines" id="machines-${line.id}">
        ${machineCards || `<div style="color:var(--muted);font-size:13px;padding:1rem;">No hay máquinas en esta línea.</div>`}
      </div>
    </div>
  `;
}

function toggleLine(lineId) {
  const el = document.getElementById('machines-' + lineId);
  const toggle = document.getElementById('toggle-' + lineId);
  const isCollapsed = el.style.maxHeight === '0px';
  el.style.maxHeight = isCollapsed ? '' : '0px';
  toggle.classList.toggle('collapsed', !isCollapsed);
}

function filterGallery(q) {
  renderGallery(allMachines, allLines, q);
}

function openMachineViewer(id) {
  // Navegar al viewer con el ID
  const url = new URL(window.location.href);
  url.searchParams.set('id', id);
  window.location.href = url.toString();
}

function goToGallery() {
  const url = new URL(window.location.href);
  url.searchParams.delete('id');
  window.location.href = url.toString();
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── THREE.JS (fallback procedural) ──────────────────────────────────
let scene,camera,renderer,toolGroup,animId,threeInitialized=false;
let isDragging=false,prevMouse={x:0,y:0};

function initThree() {
  if(threeInitialized) return;
  threeInitialized=true;
  const canvas=document.getElementById('three-canvas');
  const wrap=document.getElementById('mv-container');
  canvas.style.display='block';
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  resizeRenderer();
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x08080f);
  scene.fog=new THREE.FogExp2(0x08080f,0.06);
  camera=new THREE.PerspectiveCamera(45,wrap.clientWidth/wrap.clientHeight,0.1,200);
  camera.position.set(0,1.8,5.5); camera.lookAt(0,0.5,0);
  scene.add(new THREE.AmbientLight(0xffffff,0.35));
  const d1=new THREE.DirectionalLight(0xffffff,0.9); d1.position.set(4,6,4); d1.castShadow=true; scene.add(d1);
  scene.add(new THREE.DirectionalLight(0x3de0f0,0.3).position.set(-4,2,-3));
  const acc=new THREE.PointLight(0xc8f03d,0.5,10); acc.position.set(0,3,2); scene.add(acc);
  scene.add(new THREE.GridHelper(20,30,0x1a1a28,0x111120));
  canvas.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',()=>isDragging=false);
  window.addEventListener('mousemove',e=>{
    if(!isDragging||!toolGroup)return;
    const dx=e.clientX-prevMouse.x, dy=e.clientY-prevMouse.y;
    toolGroup.rotation.y+=dx*0.012;
    toolGroup.rotation.x+=dy*0.012;
    prevMouse={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener('touchstart',e=>{isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  window.addEventListener('touchend',()=>isDragging=false);
  window.addEventListener('touchmove',e=>{
    if(!isDragging||!toolGroup)return;
    const dx=e.touches[0].clientX-prevMouse.x, dy=e.touches[0].clientY-prevMouse.y;
    toolGroup.rotation.y+=dx*0.012;
    toolGroup.rotation.x+=dy*0.012;
    prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:true});
  window.addEventListener('resize',resizeRenderer);
  (function loop(){
    animId=requestAnimationFrame(loop);
    if(toolGroup&&!isDragging) toolGroup.rotation.y+=0.003;
    renderer.render(scene,camera);
  })();
}

function resizeRenderer(){
  if(!renderer)return;
  const wrap=document.getElementById('mv-container');
  renderer.setSize(wrap.clientWidth,wrap.clientHeight);
  if(camera){camera.aspect=wrap.clientWidth/wrap.clientHeight;camera.updateProjectionMatrix();}
}

function buildProceduralModel(type,color){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(color||'#c8f03d'),roughness:0.4,metalness:0.3});
  if(type==='drill'){const b=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,2,16),mat);b.position.y=1;g.add(b);const h=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.15,1.5,8),mat);h.position.y=-0.25;g.add(h);}
  else{const b=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.8,1.2),mat);b.position.y=0.4;g.add(b);const p=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1.5,16),mat);p.position.y=1.55;g.add(p);const base=new THREE.Mesh(new THREE.BoxGeometry(2,0.15,1.6),new THREE.MeshStandardMaterial({color:0x333344,roughness:0.8}));base.position.y=-0.075;g.add(base);}
  return g;
}

// ─── GLTF LOADER ─────────────────────────────────────────────────────
let gltfLoaderReady=false,gltfLoaderPromise=null;
function ensureGLTFLoader(){
  if(gltfLoaderReady)return Promise.resolve();
  if(gltfLoaderPromise)return gltfLoaderPromise;
  gltfLoaderPromise=new Promise((res,rej)=>{
    function loadMeshopt(cb){
      if(window.MeshoptDecoder){cb();return;}
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/meshoptimizer@0.18.1/meshopt_decoder.js';
      s.onload=()=>{if(window.MeshoptDecoder)window.MeshoptDecoder.ready.then(cb).catch(cb);else cb();};
      s.onerror=cb; document.head.appendChild(s);
    }
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
    s.onload=()=>{loadMeshopt(()=>{gltfLoaderReady=true;res();});};
    s.onerror=rej; document.head.appendChild(s);
  });
  return gltfLoaderPromise;
}

function scaleGLTF(scene){
  const box=new THREE.Box3().setFromObject(scene);
  const size=box.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z);
  const sc=2.5/(maxDim||1);
  scene.scale.setScalar(sc);
  const ctr=box.getCenter(new THREE.Vector3());
  scene.position.sub(ctr.multiplyScalar(sc));
  scene.position.y+=0.5;
  return scene;
}

function loadGLBLocal(source){
  return ensureGLTFLoader().then(()=>new Promise((res,rej)=>{
    const loader=new THREE.GLTFLoader();
    if(source.startsWith('http')||source.startsWith('blob')){
      loader.load(source,g=>res(scaleGLTF(g.scene)),undefined,rej);
    } else {
      const byteStr=atob(source.split(',')[1]);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:'model/gltf-binary'});
      const url=URL.createObjectURL(blob);
      loader.load(url,g=>{URL.revokeObjectURL(url);res(scaleGLTF(g.scene));},undefined,rej);
    }
  }));
}

// ─── VOZ ──────────────────────────────────────────────────────────────
let utterance=null,currentDesc='',pendingSpeech=null,voicesReady=false;
let audioUnlocked=false;

function unlockAndSpeak() {
  const overlay=document.getElementById('tap-overlay');
  if(overlay)overlay.style.display='none';
  audioUnlocked=true;
  if(pendingSpeech){doSpeak(pendingSpeech);pendingSpeech=null;}
}

function doSpeak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(mouthInterval)clearInterval(mouthInterval);
  utterance=new SpeechSynthesisUtterance(text);
  utterance.lang='es-CO';utterance.rate=0.90;utterance.pitch=1.1;
  const voices=window.speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang==='es-CO')||voices.find(v=>v.lang==='es-US')||voices.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('google'))||voices.find(v=>v.lang.startsWith('es'));
  if(esVoice)utterance.voice=esVoice;
  utterance.onstart=()=>{setTalkingAnim(true);mouthInterval=setInterval(()=>{mouthState++;},120);animateProgress(text.length*65);};
  utterance.onend=()=>{setTalkingAnim(false);if(mouthInterval){clearInterval(mouthInterval);mouthInterval=null;}document.getElementById('typing-cursor').style.display='none';document.getElementById('voice-progress').style.width='100%';};
  utterance.onerror=(e)=>{
    setTalkingAnim(false);
    if(e.error==='not-allowed'){
      pendingSpeech=text;
      const overlay=document.getElementById('tap-overlay');
      if(overlay)overlay.style.display='flex';
    }
  };
  window.speechSynthesis.speak(utterance);
  typeText(text);
}

function speak(text){
  if(!window.speechSynthesis)return;
  pendingSpeech=text;
  const voices=window.speechSynthesis.getVoices();
  if(voices.length>0){voicesReady=true;doSpeak(text);}
  else{
    window.speechSynthesis.onvoiceschanged=()=>{voicesReady=true;window.speechSynthesis.onvoiceschanged=null;if(pendingSpeech){doSpeak(pendingSpeech);pendingSpeech=null;}};
    setTimeout(()=>{if(!voicesReady&&pendingSpeech){voicesReady=true;doSpeak(pendingSpeech);pendingSpeech=null;}},1500);
  }
}

function animateProgress(duration){
  const bar=document.getElementById('voice-progress');
  bar.style.width='0%';bar.style.transition=`width ${duration}ms linear`;
  setTimeout(()=>bar.style.width='95%',50);
}

let typingTimer=null;
function typeText(text){
  const el=document.getElementById('text-out');
  const cur=document.getElementById('typing-cursor');
  cur.style.display='inline-block';el.textContent='';
  if(typingTimer)clearInterval(typingTimer);
  let i=0;
  typingTimer=setInterval(()=>{if(i<text.length){el.textContent+=text[i];i++;}else clearInterval(typingTimer);},28);
}

function repeatSpeech(){if(currentDesc)speak(currentDesc);}

// ─── CARGA DE MÁQUINA ────────────────────────────────────────────────
let loadToken=0;

async function loadMachine(machine){
  const myToken=++loadToken;
  document.getElementById('loading').style.display='flex';
  document.getElementById('model-fallback-tag').style.display='none';
  document.getElementById('tool-badge').textContent=machine.cat||'HERRAMIENTA';
  document.getElementById('tool-title-float').textContent=machine.name;
  document.getElementById('tool-cat-float').textContent=machine.cat;
  document.getElementById('repeat-btn').style.display='block';
  document.title=machine.name+' — TallerScan';
  currentDesc=machine.desc;

  const glbSource = machine.glbUrl || machine.glbData || null;
  const mv = document.getElementById('main-mv');

  if(glbSource) {
    mv.style.display='block';
    document.getElementById('three-canvas').style.display='none';
    mv.setAttribute('camera-controls','');mv.setAttribute('auto-rotate','');
    mv.setAttribute('auto-rotate-delay','3000');mv.setAttribute('ar','');
    mv.setAttribute('ar-modes','webxr scene-viewer quick-look');
    mv.setAttribute('shadow-intensity','1');
    mv.setAttribute('min-camera-orbit','-Infinity -Infinity auto');
    mv.setAttribute('max-camera-orbit','Infinity Infinity auto');
    mv.setAttribute('interaction-prompt','none');

    let modelUrl=null;
    if(glbSource.startsWith('data:')){
      try{
        const byteStr=atob(glbSource.split(',')[1]);
        const ab=new ArrayBuffer(byteStr.length);
        const ia=new Uint8Array(ab);
        for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
        const blob=new Blob([ab],{type:'model/gltf-binary'});
        modelUrl=URL.createObjectURL(blob);
      }catch(e){modelUrl=glbSource;}
    } else { modelUrl=glbSource; }

    const loadingEl=document.getElementById('loading');
    await new Promise(res=>{
      let attempts=0; const maxAttempts=4; const retryDelay=8000;
      function tryLoad(){
        attempts++;
        const urlWithCache=modelUrl.startsWith('blob:')?modelUrl:modelUrl+(modelUrl.includes('?')?'&':'?')+'_t='+Date.now();
        mv.src='';
        setTimeout(()=>{mv.src=urlWithCache;},50);
        const onLoad=()=>{mv.removeEventListener('error',onError);res();};
        const onError=()=>{
          mv.removeEventListener('load',onLoad);
          if(attempts<maxAttempts){
            if(loadingEl)loadingEl.querySelector('p').textContent=`Modelo no disponible aún, reintentando... (${attempts}/${maxAttempts})`;
            setTimeout(tryLoad,retryDelay);
          } else {
            mv.style.display='none';
            document.getElementById('three-canvas').style.display='block';
            document.getElementById('model-fallback-tag').style.display='block';
            document.getElementById('model-fallback-tag').textContent='⚠️ Modelo no disponible aún';
            initThree();
            if(toolGroup){scene.remove(toolGroup);toolGroup=null;}
            toolGroup=buildProceduralModel('default',machine.color);
            scene.add(toolGroup);
            res();
          }
        };
        mv.addEventListener('load',onLoad,{once:true});
        mv.addEventListener('error',onError,{once:true});
      }
      tryLoad();
    });
  } else {
    mv.style.display='none';
    document.getElementById('three-canvas').style.display='block';
    document.getElementById('model-fallback-tag').style.display='block';
    initThree();
    if(toolGroup){scene.remove(toolGroup);toolGroup=null;}
    const cat=(machine.cat||'').toLowerCase();
    let type=cat.includes('perfor')||cat.includes('drill')?'drill':'default';
    toolGroup=buildProceduralModel(type,machine.color);
    scene.add(toolGroup);
  }

  if(myToken!==loadToken)return;
  document.getElementById('loading').style.display='none';
  initChar();

  const arBtn=document.getElementById('ar-fab');
  if(arBtn&&mv&&mv.src&&(machine.glbUrl||machine.glbData)){
    arBtn.style.display='block';
  } else if(arBtn){arBtn.style.display='none';}

  setTimeout(()=>{speak(machine.desc);},1800);
}

// ─── INIT ─────────────────────────────────────────────────────────────
function init(){
  window.addEventListener('message',e=>{
    if(e.data?.type==='MACHINE_DATA'){
      document.getElementById('viewer-wrap').classList.add('active');
      document.getElementById('gallery-view').classList.remove('active');
      loadMachine(e.data.machine);
    }
    if(e.data?.type==='REQUEST_MACHINE'&&e.data.id){
      getMachineFromStorage(e.data.id).then(m=>{
        if(m)window.parent.postMessage({type:'MACHINE_DATA',machine:m},'*');
      });
    }
  });

  if(machineId){
    // MODO QR: mostrar máquina específica
    document.getElementById('viewer-wrap').classList.add('active');
    document.getElementById('gallery-view').classList.remove('active');
    document.getElementById('repeat-btn').style.display='block';

    if(isPreview&&window.parent!==window){
      document.getElementById('loading').style.display='flex';
      window.parent.postMessage({type:'REQUEST_MACHINE',id:machineId},'*');
    } else {
      getMachineFromStorage(machineId).then(m=>{
        if(m){loadMachine(m);}
        else{
          document.getElementById('loading').style.display='none';
          document.getElementById('error-state').classList.add('show');
        }
      });
    }
  } else if(!isPreview){
    // MODO GALERÍA: sin ?id=, mostrar todas las máquinas
    initGallery();
  }

  if(window.speechSynthesis)window.speechSynthesis.getVoices();
}

init();
</script>
